name: Bug report
description: Something doesn't work the way it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. The more concrete the repro, the faster the fix.
        If this is a security issue, please email `inbetweenai@proton.me` instead of opening a public issue.

  - type: textarea
    id: what
    attributes:
      label: What happened
      description: A short, factual description. What did you do, what did you expect, what did you get?
      placeholder: |
        Ran `inbetweenai login`, expected a token to be saved, instead got "401 Invalid email or password" even with the right credentials.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal recipe.
      placeholder: |
        1. Run `inbetweenai uninstall && inbetweenai install`
        2. Run `inbetweenai login --email me@x.com --password ***`
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Output of `inbetweenai doctor`
      description: Paste the full output. It tells us which piece of the install is the broken one.
      render: shell
      placeholder: |
        $ inbetweenai doctor
        ...
    validations:
      required: false

  - type: input
    id: cli-version
    attributes:
      label: CLI version
      description: From `inbetweenai status` (the version line at the top).
      placeholder: e.g. 0.3.11
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows
        - macOS
        - Linux
        - WSL2
        - other
    validations:
      required: true

  - type: input
    id: ide
    attributes:
      label: IDE / harness
      description: Claude Code, Codex CLI, or both. Add the version if you can.
      placeholder: e.g. Claude Code 2.x, Codex 0.X
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Anything else
      description: Logs, screenshots, related issues — drop anything that helps.
    validations:
      required: false
